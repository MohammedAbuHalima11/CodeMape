<!DOCTYPE html>
<html lang='ar' dir='rtl'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    
    <style>
        body,
        button,
        input,
        select,
        textarea {
            font-family: 'Tajawal', sans-serif !important;
        }
    </style>
    <title>نسيت كلمة المرور؟</title>
</head>

<body>
    <div class="bg-[#FAFAFA] min-h-screen w-full flex items-center justify-center">
        <div class="wrapper bg-white shadow-lg rounded-xl  min-w-3xs max-w-md p-4 relative">

            <a href="login.html">
                <svg xmlns="http://www.w3.org/2000/svg" height="20" width="20" viewBox="0 0 512 512 "
                    class="absolute left-4 cursor-pointer">
                    <path fill="rgb(7, 94, 102)"
                        d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z" />
                </svg>
            </a>

            <div class="info flex flex-col items-center p-4">
                <img src="../assets/images/logoo.png" alt="Logo" class="max-w-12">
                <h3 class="font-bold text-2xl pt-2.5">نسيت كلمة المرور؟</h3>
                <p class="font-normal text-[#4E5969] pt-2.5 pr-3 text-center">قم بإدخال بريدك الإلكتروني وسنقوم بإرسال
                    رابط إعادة تعيين كلمة المرور
                </p>
            </div>

            <form action="" method="" class="flex flex-col items-start gap-3">
                <div class="email_input flex flex-col items-start gap-3 w-full relative">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" name="email" id="email" placeholder="user.user@gmail.com"
                        class="border border-[#e5ebe5] rounded-md w-full py-2 px-9 focus:outline-none focus:ring-2 focus:ring-[#c0c7c8] transition-all duration-300 ease-in-out">
                    <img src="../assets/images/mail.png" alt="Mail Icon" class="absolute right-3 top-12.5 w-5">
                </div>

                <button type="submit"
                    class="bg-[#075E66] rounded-md w-full text-[#FFFFFF] h-10 mt-4 cursor-pointer transition-all duration-300 ease-in-out hover:scale-95">المتابعة</button>
            </form>
        </div>
    </div>

    <script src="../assets/js/forgot-password.js"></script>
</body>


</html>
