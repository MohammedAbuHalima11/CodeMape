<!DOCTYPE html>
<html lang='ar' dir='rtl'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    
    <style>
        body,
        button,
        input,
        select,
        textarea {
            font-family: 'Tajawal', sans-serif !important;
        }
    </style>
    <title>إعادة تعيين كلمة المرور</title>
</head>

<body>
    <div class="bg-[#FAFAFA] min-h-screen w-full flex items-center justify-center">
        <div class="wrapper bg-white shadow-lg rounded-xl  min-w-3xs p-4">
            <div class="info flex flex-col items-center p-4">
                <img src="../assets/images/logoo.png" alt="Logo" class="max-w-12">
                <h3 class="font-bold text-2xl pt-2.5">إعادة تعيين كلمة المرور</h3>
                <p class="font-normal text-[#4E5969] pt-2.5">قم بتعيين كلمة مرور جديدة لحسابك حتى تتمكن من تسجيل الدخول
                </p>
            </div>
            <form action="" method="" class="flex flex-col items-start gap-3">
                <div class="password_input flex flex-col items-start gap-1.5 w-full relative">
                    <label for="password">كلمة المرور الجديدة</label>
                    <input type="password" name="password" id="password" placeholder="● ● ● ● ●"
                        class="border border-[#e5ebe5] rounded-md w-full py-2 px-9 focus:outline-none focus:ring-2 focus:ring-[#c0c7c8] transition-all duration-300 ease-in-out ">
                    <img src="../assets/images/eye-slash.png" alt="" id="togglePassword"
                        class=" absolute right-3 top-10.5 w-5 cursor-pointer">
                    <label for="confirm-password">تأكيد كلمة المرور الجديدة</label>
                    <input type="password" name="Confirm-password" id="confirm-password" placeholder="● ● ● ● ●"
                        class="border border-[#e5ebe5] rounded-md w-full py-2 px-9 focus:outline-none focus:ring-2 focus:ring-[#c0c7c8] transition-all duration-300 ease-in-out">
                    <img src="../assets/images/eye-slash.png" alt="" id="toggleConfirmPassword"
                        class="absolute right-3 top-30 w-5 cursor-pointer">
                </div>

                <button type="submit"
                    class="bg-[#075E66] rounded-md w-full text-[#FFFFFF] h-10 mt-4 cursor-pointer transition-all duration-300 ease-in-out hover:scale-95">تأكيد</button>
            </form>
        </div>
    </div>

    <script src="../assets/js/reset-password.js"></script>
</body>


</html>
