<!DOCTYPE html>
<html lang='ar' dir='rtl'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>تم إرسال الرابط</title>
</head>

<body>
    <div class="bg-[#FAFAFA] min-h-screen w-full flex items-center justify-center">
        <div class="wrapper bg-white shadow-lg rounded-xl  min-w-3xs max-w-md p-4">
            <div class="info flex flex-col items-center p-4">
                <img src="../assets/images/logoo.png" alt="Logo" class="max-w-12">
                <h3 class="font-bold text-2xl pt-2.5">تم إرسال الرابط</h3>
                <p class="font-normal text-[#4E5969] text-base pt-2.5 pr-3 text-center">
                    تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني. يرجى التحقق من بريدك (بما في ذلك مجلد
                    الرسائل غير المرغوب
                    فيها) واتباع التعليمات لتعيين كلمة مرور جديدة.
                </p>
            </div>
            <form action="" method="" class="flex flex-col items-start gap-3">
                <button type="submit"
                    class="bg-[#075E66] rounded-md w-full text-[#FFFFFF] h-10 mt-4 cursor-pointer transition-all duration-300 ease-in-out hover:scale-95">إعادة
                    الإرسال</button>
            </form>
            <a href="login.html"
                class="font-normal text-sm text-[#075E66] block flex justify-center mt-3 cursor-pointer hover:underline">العودة
                لتسجيل
                الدخول</a>
        </div>
    </div>

    <script src="../assets/js/send-link.js"></script>
</body>


</html>
